<!DOCTYPE html> <html class="no-js" lang="en" dir="ltr"> <head> <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"> <meta charset="utf-8"> <title>Navigation queues | Navigation cues</title> <meta name="description" content="A web-essay written by Domitille Debret, designed and developed by F451 for The HTML Review Issue 04, Spring 2025."> <meta http-equiv="X-UA-Compatible" content="IE=edge"> <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"> <link rel="stylesheet" href="/assets/navigation-cues/css/navigation-cues.css"> </head> <body> <div class="container js-scrollContainer"> <main class="main"> <div class="paragraphs js-paragraphs" data-length="41" data-copies="3"></div> <template id="navigation-cues-template"><div class="paragraphs__item paragraphs__item--title js-paragraphsItem" data-index="0"> <strong>Navigation queues<br>Navigation cues</strong> <small>A web-essay written by Domitille Debret, designed and developed by F451 for The HTML Review Issue 04, Spring 2025.</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="1">Drawing from my work as a web designer and the all-too-familiar experience of late-night doomscrolling, I’ve come to recognise a quiet, persistent fear. A fear that unsettles those trying to sway what users see and those trying to protect their own attention from being wholly consumed. The fear of scrolling.</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="2">Clients and collaborators are often uneasy about letting information live beyond the first visible viewport. They worry users won’t scroll, that key details will go unnoticed and that attention will vanish when an image, a button or a title slips out of view. In contrast, as we trawl mindlessly through endless streams of content, the fear shifts. It’s no longer about missing information, it’s about being lost.</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="3">Despite its simplicity and ubiquity, scrolling carries unease, whether we’re trying to control what others see or protect ourselves from being pulled in too deep. Somehow, it brings a tension between control, attention, and the unknown.</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="4">I never really noticed when the scrollbar started fading away, but during my lifetime, I watched it grow thinner, begin to fade when inactive, and finally only appear with a cursory movement. Eventually, this behaviour became the default, an interface element that exists only on demand, no longer a fixed part of the screen.</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="5">This change crept in so subtly that it blurred the edges of my memory (and my web browser), much like a well-worn path slowly overgrown. The scroll bar faded away, almost like a ghost of its former self, replaced by an emphasis on continuous motion instead of clear indicators.</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="6">As there is not really a firm marker of the shift, I tried to find evidence via tech forum posts or user complaints. Tracking the first comments to around 2012, I realised auto-hiding scroll bars have been the default for almost half my life.</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="7">Based on this anecdotal evidence, It seems the shift began in the early to mid-2010s, with the arrival of OS X Lion (2011) auto-hiding scrollbars began to be introduced. They steadily became the default option in various operating systems and applications and became more and more prevalent in web browsers.</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="8">So why am I only noticing I miss something now?</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="9">Trying to reconcile my fear, I’ve spent considerable time delving into the rabbit holes of Reddit threads and Mac user forums from that time. The discussions spanned years, sometimes heated and sometimes poetic, centring on accessibility, frustration, nostalgia, and possibly fear too:</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="10"> <em>“Is this a legitimate concern, or will Lion users know that if something appears to be cut off, it indicates that scrolling might be available?”</em> <small>neezer, Jul 25, 2011 at 03:27 PM, Mac OS X Lion, scrollbars, and website usability on Stack Overflow</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="11"> <em>“you DO NOT want to scroll scroll scroll scroll”</em> <small>Wiikend, Dec 20, 2019 at 10:24 AM, Is anyone else annoyed with the trend for minimal/hidden scroll bars lately? on Reddit</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="12"> <em>“Multiple times daily I get angry because of no arrows”</em> <small>macgirl_k, Apr 25, 2013 at 3:56 PM, About the little scrollbar arrows… on Apple Support Community</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="13"> <em>“Anyone know how or if there’s a possibility of getting the arrows back?”</em> <small>Gulldo, Aug 10, 2011 2:14 AM, About the little scrollbar arrows… on Apple Support Community</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="14"> <em>“Give us back our arrows!!”</em> <small>Martins Silins, Aug 15, 2011 at 11:06 PM, About the little scrollbar arrows… on Apple Support Community</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="15"> <em>“I neeeeeeeeed the arrows.”</em> <small>Community User, Oct 18, 2011 at 08:03 AM, About the little scrollbar arrows… on Apple Support Community</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="16"> <em>“Where are my damn scrollbars!”</em> <small>Cody Gray, Jul 25, 2011 at 03:54 AM Mac OS X Lion, scrollbars, and website usability on Stack Overflow</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="17"> <em>“Sorry to post here without a helpful solution, but I suppose I’m adding some sympathy […] There is perhaps faint hope from the fact that Google Chrome sometimes leaves ‘artefacts’, or broken bits of scrollbar where the arrows ought to be. Sometimes I find blank white space there […] some part of the system is still calling for them”</em> <small>kierant@cogs, Aug 10, 2011 at 11:01 AM, About the little scrollbar arrows… on Apple Support Community</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="18"> <em>“People said not to worry - you’ll get used to the new way of doing things. But the ‘New Way’ so far has not revealed itself.”</em> <small>davewiner, Feb 15, 2013 at 08:56 AM, Mac scrollbar woes on Scripting News</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="19"> <em>“I’ve gone through the ‘downgrade’ process […] and now I’m so much happier.”</em> <small>kierant@cogs, Aug 19, 2011 at 06:00 AM About the little scrollbar arrows… on Apple Support Community</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="20">As a result, a recurring theme throughout these threads was tutorials on downgrading to previous OS versions. Within these forums, threads on this topic sometimes lasted over 7 years. Through time, the topic seemed to lose its relevance and based on the comments, it seems to have been partly resolved by hardware evolutions:</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="21"> <em>“I am now presumably going to have to replace a perfectly good optical mouse, which is in fine working order and has served me well, with a new one with a wheel.”</em> <small>Gahlen, Nov 1, 2011 at 12:59 AM, About the little scrollbar arrows… on Apple Support Community</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="22">Trackpads, mousewheels, touchscreen, tablets and phones became more prevalent and partly resolved the navigation part of the issue. Yet, this shift meant that scrolling became more about the gesture than about addressing essential features.</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="23">It may seem trivial to restate, but the height of the scrollbar relative to the window mirrors the height of visible content compared to the full content. In that sense, the scrollbar is one of the best data visualisation tools. The problem with the scrollbar’s now cameo-like appearance is that the sense of scope and orientation, once provided by a quick glance at it, is lost:</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="24"> <em>“The scrollbar is so faint it is extremely difficult to see to tell where on the page I am.”</em> <small>Chuck Risher, Aug 19, 2011 at 03:57 AM, About the little scrollbar arrows… on Apple Support Community</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="25"> <em>“This is kinda thrown out the window with Mac OS X Lion, which (as a default) hides the scroll bars unless you’re actively scrolling. […] I think there are very strong visual clues that you can scroll to see more content.”</em> <small>neezer, Jul 25, 2011 at 03:27 PM, Mac OS X Lion, scrollbars, and website usability on Stack Overflow</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="26">This gradual disappearance paralleled the fading away of the concept of limits, both for the page and the content itself. While I can’t pinpoint a direct correlation between infinite scrolling and the vanishing scrollbar, I feel that they are intrinsically linked.</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="27">With interfaces stretching indefinitely, users stop looking for boundaries. The fading scrollbars most likely obscure the issue with infinite scrolling. No longer tied to the size of the document, the scrollbar loses its meaning, making navigation feel absurd. Without an endpoint, how do we find ourselves?</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="28">If you take the time to look at the behaviour of the scrollbar on a website running infinite scroll, you will see that as you traverse the visible, the invisible loads dynamically, and the scrollbar shrinks accordingly. It is no longer telling me where I am, but somehow, it’s also lying to me about how far I can go.</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="29"> <em>just</em> <small></small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="30"> <em>something</em> <small></small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="31">Infinite scrolling has since become a cautionary tale. Aza Raskin, who invented infinite scrolling, has spoken publicly about regretting its negative impact and now actively campaigns against its use. Without cues to halt, users continue endlessly consuming content without awareness of why.</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="32">Opening up about my personal fear of scrolling, my friend -Lola- recently told me that she often catches herself scrolling the Maps app on her phone, not searching for anything, just moving. Like a nervous tic, a mindless motion with no real destination. It struck me as the perfect mirror of the kind of motion infinite scrolling quietly trains us in.</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="33">Scrollbars are a strange element in web development. Coding guidelines often advise leaving them untouched:</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="34"> <em>“Scrollbars are part of the area of the browser that is outside your scope of concern. Some may argue with this and claim that being allowed to style them with CSS means that it is fair game. However, I think there are some accessibility considerations that were not taken into account before this capability was given to us by the platform.”</em> <small>ericwbailey, May 3, 2023, Don’t use custom CSS scrollbars</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="35"> <em>“I’m to some extent against implementing all the pseudo-elements of scrollbar. I guess implementing a small subset of them might be fine, but providing the whole power of touching every details of the scrollbar is probably not.”</em> <small>Xidorn Quan, Apr 10, 2018 at 01:55 PM, Support -webkit-scrollbar styles for webcompat on Bugzilla</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="36"> <em>“To all you designers out there: Please leave the scrollbar alone!“</em> <small>horsht, Jan 28, 2019 at 12:41 AM, Why do developers feel the need to reinvent and replace perfectly fine basic functionalities like scrolling/scrollbars? on Reddit</small> </div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="37">Scrollbars are one of the few UI elements controlled by both browsers and designers, a kind of shared custody agreement over how users navigate. Tweaking them feels like a hack, a workaround rather than a real solution.</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="38">Over time, modifying scrollbars became frowned upon, mostly (and rightfully) for accessibility reasons. But it’s a strange trade-off: it’s something so fundamental to how we interact with digital space, yet we have almost no control over it. Designing a scrollbar is actively discouraged today, reinforcing the idea that control over navigation is slipping further from the hands of both users and web creators.</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="39">Long before infinite scrolling or pull-to-refresh, the scrollbar solved the web’s first scaling problem: how to situate yourself within content that stretched beyond the visible screen. Somewhere along the way, the usage changed and became a fuel for motion. A motion I can’t really control and a motion I can’t really resist.</div> <div class="paragraphs__spacer"> </div> <div class="paragraphs__item js-paragraphsItem" data-index="40">Getting lost is a rational fear. I will miss knowing where I am. I will miss the sense that I am tethered to something, that I am not just scrolling but moving with intention.</div> <div class="paragraphs__spacer"> </div></template> </main> <div class="counter js-progress">0%</div> </div> <div class="scroll js-scrollMirror"><div></div></div> <script src="/assets/navigation-cues/js/navigation-cues.js?v=7" defer></script> </body> </html>
