# Fortunes for /fortune/
# Quotes pulled from books on Ara's bookshelf at /reading/.
# Each entry: text, author, source.

- text: "Have patience with everything that remains unsolved in your heart. Try to love the questions themselves, like locked rooms and like books written in a foreign language."
  author: Rainer Maria Rilke
  source: Letters to a Young Poet

- text: "And now we welcome the new year, full of things that have never been."
  author: Rainer Maria Rilke
  source: Letters to a Young Poet

- text: "Perhaps all the dragons in our lives are princesses who are only waiting to see us act, just once, with beauty and courage."
  author: Rainer Maria Rilke
  source: Letters to a Young Poet

- text: "I held my mother's hand when she crossed over, just as she'd held mine when I'd come into this world."
  author: Khaled Hosseini
  source: And the Mountains Echoed

- text: "It always hurts more to have and lose than to not have in the first place."
  author: Khaled Hosseini
  source: And the Mountains Echoed

- text: "There was a way to be good again."
  author: Khaled Hosseini
  source: The Kite Runner

- text: "For you, a thousand times over."
  author: Khaled Hosseini
  source: The Kite Runner

- text: "It may be unfair, but what happens in a few days, sometimes even a single day, can change the course of a whole lifetime."
  author: Khaled Hosseini
  source: The Kite Runner

- text: "Mother, I am dumb today. I cannot speak to you. I cannot understand. Forgive me."
  author: Albert Camus
  source: The Stranger

- text: "I opened myself to the gentle indifference of the world."
  author: Albert Camus
  source: The Stranger

- text: "As if that blind rage had washed me clean, rid me of hope; for the first time, in that night alive with signs and stars, I opened myself to the gentle indifference of the world."
  author: Albert Camus
  source: The Stranger

- text: "I cannot live without my life. I cannot live without my soul."
  author: Albert Camus
  source: The Stranger

- text: "As Gregor Samsa awoke one morning from uneasy dreams he found himself transformed in his bed into a gigantic insect."
  author: Franz Kafka
  source: The Metamorphosis

- text: "I am free and that is why I am lost."
  author: Franz Kafka
  source: The Metamorphosis

- text: "Don't bend; don't water it down; don't try to make it logical; don't edit your own soul according to the fashion. Rather, follow your most intense obsessions mercilessly."
  author: Franz Kafka
  source: The Metamorphosis

- text: "We are all so much together, but we are all dying of loneliness."
  author: Albert Schweitzer
  source: borrowed for the shelf

- text: "If you want to find out what someone fears the most, listen to what they make fun of."
  author: Nassim Nicholas Taleb
  source: The Bed of Procrustes

- text: "We notice what doesn't fit, and miss what does — until everything in life is what it is, plus our worry about it."
  author: Nassim Nicholas Taleb
  source: The Bed of Procrustes

- text: "The three most harmful addictions are heroin, carbohydrates, and a monthly salary."
  author: Nassim Nicholas Taleb
  source: The Bed of Procrustes

- text: "An idea starts to be interesting when you get scared of taking it to its logical conclusion."
  author: Nassim Nicholas Taleb
  source: The Bed of Procrustes

- text: "Read what you love until you love to read."
  author: Naval Ravikant
  source: The Almanack of Naval Ravikant

- text: "Desire is a contract you make with yourself to be unhappy until you get what you want."
  author: Naval Ravikant
  source: The Almanack of Naval Ravikant

- text: "Happiness is a default state. Happiness is what's there when you remove the sense that something is missing in your life."
  author: Naval Ravikant
  source: The Almanack of Naval Ravikant

- text: "Play long-term games with long-term people."
  author: Naval Ravikant
  source: The Almanack of Naval Ravikant

- text: "What you and I would call self-actualisation, the Stoics would call self-mastery."
  author: Naval Ravikant
  source: The Almanack of Naval Ravikant

- text: "Happiness is when what you think, what you say, and what you do are in harmony."
  author: Mahatma Gandhi
  source: borrowed for the shelf

- text: "I now walk into the wild."
  author: Christopher McCandless
  source: Into the Wild

- text: "The joy of life comes from our encounters with new experiences, and hence there is no greater joy than to have an endlessly changing horizon."
  author: Jon Krakauer
  source: Into the Wild

- text: "When you want something in life, you just gotta reach out and grab it."
  author: Jon Krakauer
  source: Into the Wild

- text: "Happiness is only real when shared."
  author: Christopher McCandless via Krakauer
  source: Into the Wild

- text: "If we admit that human life can be ruled by reason, the possibility of life is destroyed."
  author: Leo Tolstoy
  source: borrowed for the shelf

- text: "Most humans only live in fear because we can't see far enough."
  author: Christopher McDougall
  source: Born to Run

- text: "Everything you need to be is already inside you. Stop letting the world tell you who you should be."
  author: Christopher McDougall
  source: Born to Run

- text: "You don't stop running because you get old. You get old because you stop running."
  author: Christopher McDougall
  source: Born to Run

- text: "He who has a why to live can bear almost any how."
  author: Friedrich Nietzsche
  source: borrowed for the shelf

- text: "We are all equal in the fact that we are all different."
  author: C.T. Vivian
  source: borrowed for the shelf

- text: "If you have to be told something twice, you weren't really listening the first time."
  author: George Orwell
  source: 1984

- text: "Until they become conscious they will never rebel, and until after they have rebelled they cannot become conscious."
  author: George Orwell
  source: 1984

- text: "Perhaps one did not want to be loved so much as to be understood."
  author: George Orwell
  source: 1984

- text: "Big Brother is watching you."
  author: George Orwell
  source: 1984

- text: "Freedom is the freedom to say that two plus two make four. If that is granted, all else follows."
  author: George Orwell
  source: 1984

- text: "Books break the shackles of time. A book is proof that humans are capable of working magic."
  author: Carl Sagan
  source: Cosmos

- text: "We are made of star-stuff. We are a way for the cosmos to know itself."
  author: Carl Sagan
  source: Cosmos

- text: "It pays to keep an open mind, but not so open your brains fall out."
  author: Carl Sagan
  source: borrowed for the shelf

- text: "Somewhere, something incredible is waiting to be known."
  author: Carl Sagan
  source: borrowed for the shelf

- text: "The road that connected us was a long road, and even when we got there I knew we'd never really arrive."
  author: Erika Fatland
  source: Sovietistan

- text: "There are countries you can leave, and there are countries that won't leave you."
  author: Erika Fatland
  source: Sovietistan

- text: "Dignity is the way we treat each other when we have every reason not to."
  author: Chris Arnade
  source: Dignity

- text: "If you want to know what's broken in a place, look at the people the place forgot."
  author: Chris Arnade
  source: Dignity

- text: "If you don't run, you don't know what your body can do. If you don't write, you don't know what your mind can hold."
  author: Rickey Gates
  source: Cross Country

- text: "There is no real ending. It's just the place where you stop the story."
  author: Frank Herbert
  source: borrowed for the shelf
