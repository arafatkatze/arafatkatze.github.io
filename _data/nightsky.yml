# Stories from my night sky — the people who shape me, plotted as stars.
#
# Replace the four sample entries below with real people. The page looks
# best with 4–15 named stars; you can go further but the sky starts
# feeling crowded.
#
# Fields:
#   id         (required)  unique, stable, used by constellations
#   name       (required)  display name
#   role       (optional)  one-line subtitle ("the one who taught me to surf")
#   x, y       (required)  position on the sky in percent (0–100)
#   magnitude  (optional)  0.4 (faint) → 1.0 (bright). Default 0.85
#   color      (optional)  warm white "#fff5d6" / cool "#e8f0ff" / etc.
#   since      (optional)  e.g. "2014" — shown under the name
#   image      (optional)  avatar image URL (Cloudinary, etc.)
#   link       (optional)  internal link e.g. "/blog/letter-to-aurora"
#   story      (required)  the story. Markdown-style paragraphs (blank line
#                          between them). Plain text only — no HTML.
#
# show_constellations: false  ← keep faint connecting lines off by default;
#                               flip to true to render the entries below.

show_constellations: false

people:
  - id: aurora
    name: "Aurora"
    role: "the one who taught me to surf"
    x: 18
    y: 70
    magnitude: 1.0
    color: "#fff1d2"
    since: "2018"
    story: |
      This is sample text — replace it with the real story you want to tell
      about Aurora. Two or three short paragraphs read best inside the modal.

      I remember the first time we paddled out at Pacifica. The fog was so
      thick we couldn't see the cliffs, and I was certain I was going to
      drown. She laughed, pointed at a wave, and said "this one's yours."
      It wasn't, but the next one was, and that's how I learned.

  - id: orion
    name: "Orion"
    role: "first friend in a new city"
    x: 46
    y: 22
    magnitude: 0.9
    color: "#bdd0ff"
    since: "2016"
    story: |
      Sample text for Orion — replace with the real story.

      Some friendships are built slowly. Others are built in a single
      late-night conversation in a half-empty diner where neither of you
      can remember how you got there. Ours was the second kind.

  - id: vega
    name: "Vega"
    role: "the late-night co-conspirator"
    x: 66
    y: 50
    magnitude: 0.95
    color: "#ffd9a8"
    since: "2020"
    story: |
      Sample text for Vega — replace with the real story.

      Every good idea I've ever had was a worse idea before Vega yelled at
      it for an hour.

  - id: lyra
    name: "Lyra"
    role: "the steady one"
    x: 84
    y: 72
    magnitude: 0.8
    color: "#eef2ff"
    since: "2014"
    story: |
      Sample text for Lyra — replace with the real story.

      The kind of person who answers the phone at 3am and doesn't make you
      feel weird about it the next morning.

# Optional: faint connecting lines through groups of stars. Off by default
# (set show_constellations: true above to draw them). Each entry is a list
# of ids; order matters for the polyline.
constellations:
  - [aurora, vega, orion, lyra]
