# Stories from my night sky.
#
# The conceit: every star here is a *real* one in the night sky. Its name
# and meaning are a portrait of the person it stands for — but the
# person themselves stays anonymous. The brightness reflects how loud
# they are in my life; the color, the spectral class. Whether you know
# any of them is between us.
#
# These 24 stars are the interactive companion to the blog post
# "Messages to 24 People I Know" — each star carries one of the 24
# anonymous messages. At rest they look like ordinary stars scattered
# across the sky; you can't tell which ones hold a message until you
# hover and one blooms open.
#
# Positions are NOT set here — the JS scatters the stars organically
# (blue-noise) so the sky never looks like a grid. Order matters though:
# the Nth star carries the Nth message.
#
# Fields:
#   id            (required)  unique, stable
#   name          (required)  the real star's name (Polaris, Sirius, …)
#   role          (optional)  one-line subtitle — what kind of person they
#                             are in your life. Keep it abstract.
#   star_meaning  (optional)  one-line gloss on the star itself — why this
#                             star fits this person.
#   constellation (optional)  e.g. "Ursa Minor"
#   magnitude     (optional)  0.4 (faint) → 1.2 (bright). Default 0.85.
#                             Drives the size of the bloom on hover.
#   color         (optional)  hex tint to suggest spectral class
#   since         (optional)  e.g. "2014" — shown under the name
#   image         (optional)  avatar image URL
#   link          (optional)  internal link, e.g. "/blog/letter"
#   story         (required)  paragraphs separated by blank lines.
#                             Plain text, no HTML.
#
# show_constellations:  set true to draw faint connecting lines between
# stars listed in `constellations:` below. Off by default.

show_constellations: false

people:
  - id: sirius
    name: "Sirius"
    star_meaning: "the brightest star in the sky — the Dog Star."
    constellation: "Canis Major"
    magnitude: 1.2
    color: "#d8e8ff"
    story: |
      You are a good dude and I see so much potential in you, please prove me right by doing something really cool and awesome with your life.

  - id: betelgeuse
    name: "Betelgeuse"
    star_meaning: "the red shoulder of Orion — a giant near the end of its life."
    constellation: "Orion"
    magnitude: 0.95
    color: "#ff9b6f"
    story: |
      You changed my life upside down for the better but my own shame got in between us, I am so sorry for disappointing you in all the ways that I did and hopefully someday you will be able to forgive me.

  - id: mizar
    name: "Mizar"
    star_meaning: "the horse and rider — a star that is secretly two."
    constellation: "Ursa Major"
    magnitude: 0.7
    color: "#e8eeff"
    story: |
      I don't think you believe a word of what you are saying even when you claim to be a believer. You are more interested in making people feel that you believe in something rather than actually believing in something yourself which is sad because if you were just honest people would like you a lot.

  - id: vega
    name: "Vega"
    star_meaning: "the harp star — Lyra's falling vulture-musician."
    constellation: "Lyra"
    magnitude: 1.0
    color: "#dbe6ff"
    story: |
      I have never loved someone more and been disappointed by them more than I was by you. I still wish you well and I hope you find your bliss after all these years.

  - id: capella
    name: "Capella"
    star_meaning: "the little she-goat — a golden light in Auriga."
    constellation: "Auriga"
    magnitude: 0.9
    color: "#fff0c8"
    story: |
      Your love has shown me that just about anything is possible, I wish you loved yourself just as much as you loved me.

  - id: algol
    name: "Algol"
    star_meaning: "the Demon Star — it dims and brightens, never the same twice."
    constellation: "Perseus"
    magnitude: 0.75
    color: "#cdd9ff"
    story: |
      Depending on the day and the time I think of you, I oscillate between calling you a monster or perhaps a troubled soul. No matter how many years pass, I suppose I will never know.

  - id: aldebaran
    name: "Aldebaran"
    star_meaning: "the follower — the orange eye of the bull."
    constellation: "Taurus"
    magnitude: 0.85
    color: "#ffb37a"
    story: |
      You made it so so hard to love you but I still kept choosing you until one day it became clear that you wanted me to stop and I did.

  - id: altair
    name: "Altair"
    star_meaning: "the flying eagle — fast, far, hard to keep up with."
    constellation: "Aquila"
    magnitude: 0.85
    color: "#f0f4ff"
    story: |
      You have a long way to go my man, keep moving and exploring.

  - id: achernar
    name: "Achernar"
    star_meaning: "'the river's end' — where Eridanus finally runs out."
    constellation: "Eridanus"
    magnitude: 0.8
    color: "#cfe0ff"
    story: |
      You're the smartest unfinished person I know, don't let potential be written on your tombstone.

  - id: pollux
    name: "Pollux"
    star_meaning: "the immortal twin of Gemini."
    constellation: "Gemini"
    magnitude: 0.75
    color: "#ffd9a0"
    story: |
      If you knew how many nights I have laid in bed thinking of you, you would see me very differently. Let's be friends again(not that we aren't friends, but I mean like really be friends like we used to be).

  - id: arcturus
    name: "Arcturus"
    star_meaning: "the bear-watcher — a steady old orange giant."
    constellation: "Boötes"
    magnitude: 1.0
    color: "#ffcf9e"
    story: |
      The amount of love in your heart is so big that flows out of you into the people you meet, there's a calmness in your presence that kept me grounded.

  - id: antares
    name: "Antares"
    star_meaning: "rival of Mars — the red, defiant heart of the scorpion."
    constellation: "Scorpius"
    magnitude: 0.95
    color: "#ff8a66"
    story: |
      I knew you had to do what you had to do, I get it, but it was still really cruel. Fuck you!

  - id: castor
    name: "Castor"
    star_meaning: "the mortal twin — itself a knot of six stars."
    constellation: "Gemini"
    magnitude: 0.65
    color: "#eef2ff"
    story: |
      I know we were just colleagues but you are so much more than that to me, I am really really gonna miss you, nerd, you are my favourite nerd in the world. Your strange voice is something I won't forget.

  - id: deneb
    name: "Deneb"
    star_meaning: "the swan's tail — so far away that its light is ancient."
    constellation: "Cygnus"
    magnitude: 0.85
    color: "#eef3ff"
    story: |
      I don't know how different life would have been if I hadn't met you. Unbeknownst to you, I try to be extra nice to strangers in distress in hopes that somehow the grace you showed me can be paid back in an odd sort of universal karmic calculus.

  - id: bellatrix
    name: "Bellatrix"
    star_meaning: "the warrior woman of Orion."
    constellation: "Orion"
    magnitude: 0.7
    color: "#cdd9ff"
    story: |
      You are a funny dude but also a kind of a psychopath from time to time. But then again, youth can justify a lot of things.

  - id: fomalhaut
    name: "Fomalhaut"
    star_meaning: "'the mouth of the fish' — a lonely southern light."
    constellation: "Piscis Austrinus"
    magnitude: 0.7
    color: "#eaf0ff"
    story: |
      Was it you? really just tell me the truth, if it was you or was it somebody else?

  - id: spica
    name: "Spica"
    star_meaning: "the ear of wheat — blue-white and sharp."
    constellation: "Virgo"
    magnitude: 0.8
    color: "#cdd9ff"
    story: |
      I see so much light in you but I don't know why that is, I hope you make the best of your 20s.

  - id: canopus
    name: "Canopus"
    star_meaning: "the great navigator — second brightest of all."
    constellation: "Carina"
    magnitude: 1.05
    color: "#fff4e0"
    story: |
      Your life can literally be a movie and it would still be underwhelming. You made me want to be a better person, I wish we were friends in real life and not just online talking every few weeks.

  - id: procyon
    name: "Procyon"
    star_meaning: "'before the dog' — it rises just ahead of Sirius."
    constellation: "Canis Minor"
    magnitude: 0.85
    color: "#eef2ff"
    story: |
      I can't believe how your real life and professional life are so different. And as much as I like to troll whenever I am around you, I really respect and look up to you.

  - id: regulus
    name: "Regulus"
    star_meaning: "the little king at the heart of the lion."
    constellation: "Leo"
    magnitude: 0.7
    color: "#dfe9ff"
    story: |
      I really like you a lot you know, I know I am not allowed to say it because we have a mutual pact of playful rivalry but you are so pretty and funny and I wish to see you more.

  - id: rigel
    name: "Rigel"
    star_meaning: "'the foot of the giant' — Orion's blue-white anchor."
    constellation: "Orion"
    magnitude: 1.0
    color: "#c8d6ff"
    story: |
      You are the reason I like sophisticated English people.

  - id: mirfak
    name: "Mirfak"
    star_meaning: "the elbow — the bright heart of Perseus."
    constellation: "Perseus"
    magnitude: 0.6
    color: "#fff2d6"
    story: |
      What the fuck bro, you were so so cool? What happened? Can't believe you became like the rest of them.

  - id: alnilam
    name: "Alnilam"
    star_meaning: "the middle jewel of Orion's belt."
    constellation: "Orion"
    magnitude: 0.75
    color: "#d2ddff"
    story: |
      You have such a deep moral compass, I really admire that about you. I wish I had matured as fast as you did but knowing you, I know it's not too late, I can still do it.

  - id: polaris
    name: "Polaris"
    star_meaning: "the North Star — the one that holds still so you can find your way."
    constellation: "Ursa Minor"
    magnitude: 0.8
    color: "#fff5e0"
    story: |
      You taught me how to be a good man, I will never be able to repay you for that but I will try to be a good person and hope that works out.


# Optional faint connecting lines. Off by default.
constellations: []
