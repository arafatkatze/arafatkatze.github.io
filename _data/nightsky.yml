# Stories from my night sky.
#
# The conceit: every star here is a *real* one in the night sky. Its name
# and meaning are a portrait of the person it stands for — but the
# person themselves stays anonymous. The brightness reflects how loud
# they are in my life; the color, the spectral class. Whether you know
# any of them is between us.
#
# Fields:
#   id            (required)  unique, stable
#   name          (required)  the real star's name (Polaris, Sirius, …)
#   role          (optional)  one-line subtitle — what kind of person they
#                             are in your life. Keep it abstract.
#   star_meaning  (optional)  one-line gloss on the star itself — why this
#                             star fits this person.
#   constellation (optional)  e.g. "Ursa Minor"
#   x, y          (required)  position on the sky in percent (0–100)
#   magnitude     (optional)  0.4 (faint) → 1.0 (bright). Default 0.85
#   color         (optional)  hex tint to suggest spectral class
#   since         (optional)  e.g. "2014" — shown under the name
#   image         (optional)  avatar image URL
#   link          (optional)  internal link, e.g. "/blog/letter"
#   story         (required)  paragraphs separated by blank lines.
#                             Plain text, no HTML.
#
# show_constellations:  set true to draw faint connecting lines between
# stars listed in `constellations:` below. Off by default.

show_constellations: false

people:
  - id: polaris
    name: "Polaris"
    star_meaning: ""
    constellation: "Ursa Minor"
    x: 50
    y: 12
    magnitude: 0.7
    color: "#fff5e0"
    since: ""
    story: |
      I struggle between deep admiration and a pure confusion when I think of you. 
      You have suffered so much to make magic and I am honored to be part of your
      it and yet You make me wonder how someone can be so kind and 
      so callous at the same time.

  - id: sirius
    name: "Sirius"
    star_meaning: "the brightest star in the night sky. The Dog Star."
    constellation: "Canis Major"
    x: 18
    y: 78
    magnitude: 1.0
    color: "#d8e8ff"
    since: ""
    story: |
      I can't believe you gave up so many things to make me happy. Its unreal.
      Your life is almost a biblical tale. I wish we had done right by you. 
      I am really sorry but I do love you a lot and I hope you know that.

  - id: vega
    name: "Vega"
    star_meaning: "the harp star — Lyra's brightest, named for the falling vulture-musician."
    constellation: "Lyra"
    x: 82
    y: 18
    magnitude: 0.95
    color: "#dde8ff"
    since: ""
    story: |
      I look at you like I have never seen a women, I can't help but stare at you,
      its one of my favorite things to do. there's no point in trying to hide it, 
      I know that you know. I hope you remember that on your bad days. 

  - id: altair
    name: "Altair"
    star_meaning: "the flying eagle, fast, far, hard to keep up with."
    constellation: "Aquila"
    x: 88
    y: 46
    magnitude: 0.8
    color: "#f0f4ff"
    since: ""
    story: |
      I love how you keep floating through life like a bird. Always drifting
      with the wave of emotion, I wish I could be more like you. A bit more 
      free a bit more alive a bit more relaxed. You make me feel like love is 
      the only thing that matters and everything else is just
       a haze of logistics to get to love.

  - id: antares
    name: "Antares"
    star_meaning: "rival of Mars: the red, defiant heart of the scorpion."
    constellation: "Scorpius"
    x: 70
    y: 80
    magnitude: 0.78
    color: "#ff9c80"
    since: ""
    story: |
      You know if we didn't fight about dumb stuff all day life won't be as fun
      as it is. I know we will part ways soon and I don't know what I will 
      do if I don't get to pick a fight with you. I hope you are
      happy wherever you go, I hope you miss me atleast half as much as I will 
      miss you.


  - id: rigel
    name: "Rigel"
    star_meaning: "'foot of the giant' — Orion's blue-white anchor."
    constellation: "Orion"
    x: 12
    y: 56
    magnitude: 0.9
    color: "#c8d6ff"
    since: ""
    story: |
      I worry about you a lot and someday I hope we solve all your
      troubles. There's no one who deserves as much joy as you. 
      You were once my protector and now I wish to be yours.


# Optional faint connecting lines. Off by default.
constellations: []
