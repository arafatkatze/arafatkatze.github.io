# Stories from my night sky.
#
# The conceit: every star here is a *real* one in the night sky. Its name
# and meaning are a portrait of the person it stands for — but the
# person themselves stays anonymous. The brightness reflects how loud
# they are in my life; the color, the spectral class. Whether you know
# any of them is between us.
#
# Fields:
#   id            (required)  unique, stable
#   name          (required)  the real star's name (Polaris, Sirius, …)
#   role          (optional)  one-line subtitle — what kind of person they
#                             are in your life. Keep it abstract.
#   star_meaning  (optional)  one-line gloss on the star itself — why this
#                             star fits this person.
#   constellation (optional)  e.g. "Ursa Minor"
#   x, y          (required)  position on the sky in percent (0–100)
#   magnitude     (optional)  0.4 (faint) → 1.0 (bright). Default 0.85
#   color         (optional)  hex tint to suggest spectral class
#   since         (optional)  e.g. "2014" — shown under the name
#   image         (optional)  avatar image URL
#   link          (optional)  internal link, e.g. "/blog/letter"
#   story         (required)  paragraphs separated by blank lines.
#                             Plain text, no HTML.
#
# show_constellations:  set true to draw faint connecting lines between
# stars listed in `constellations:` below. Off by default.

show_constellations: false

people:
  - id: polaris
    name: "Polaris"
    role: "the one I steer by"
    star_meaning: "the North Star — what sailors looked up at to find their way home."
    constellation: "Ursa Minor"
    x: 50
    y: 12
    magnitude: 0.7
    color: "#fff5e0"
    since: ""
    story: |
      Some people you go to with a problem. Others you go to with a
      version of yourself you don't quite trust yet, and they listen long
      enough that the version becomes real.

      I have one of those. They don't say much. They don't need to. I
      have walked into rooms with them and walked out a slightly steadier
      person than I came in.

  - id: sirius
    name: "Sirius"
    role: "the loyal one"
    star_meaning: "the brightest star in the night sky. The Dog Star."
    constellation: "Canis Major"
    x: 18
    y: 78
    magnitude: 1.0
    color: "#d8e8ff"
    since: ""
    story: |
      Some friendships are seasonal. This one is not.

      Through the years, the moves, the bad decisions, the long phases of
      silence — they have always still been there when I came back, with
      the same eyes, asking the same first question.

  - id: vega
    name: "Vega"
    role: "the one who makes things sing"
    star_meaning: "the harp star — Lyra's brightest, named for the falling vulture-musician."
    constellation: "Lyra"
    x: 82
    y: 18
    magnitude: 0.95
    color: "#dde8ff"
    since: ""
    story: |
      Most days I think in straight lines. Around them I think in chords.

      They are the friend who hears the same song I hear and adds the
      harmony I didn't know was missing. Almost everything I have made
      that I'm proud of has their fingerprints somewhere on it.

  - id: altair
    name: "Altair"
    role: "the wanderer"
    star_meaning: "the flying eagle — fast, far, hard to keep up with."
    constellation: "Aquila"
    x: 88
    y: 46
    magnitude: 0.8
    color: "#f0f4ff"
    since: ""
    story: |
      They are never where I left them. New city, new project, new
      tangle of people, every time.

      I love them precisely for it. They remind me that a life can be
      restless without being lost.

  - id: antares
    name: "Antares"
    role: "the one who fights me on every idea"
    star_meaning: "rival of Mars — the red, defiant heart of the scorpion."
    constellation: "Scorpius"
    x: 70
    y: 80
    magnitude: 0.78
    color: "#ff9c80"
    since: ""
    story: |
      Every good idea I have ever had was a worse idea before they yelled
      at it for an hour.

      They do not let me get away with my own nonsense. The conversations
      I dread the most before, I'm always grateful for after.

  - id: betelgeuse
    name: "Betelgeuse"
    role: "the dramatic one"
    star_meaning: "a red supergiant — so massive it's expected to go supernova in our galaxy's lifetime."
    constellation: "Orion"
    x: 30
    y: 28
    magnitude: 0.85
    color: "#ff8d6e"
    since: ""
    story: |
      Nothing is small with them. A coffee is an event. A bad day is a
      tragedy. A good day is the best thing that has ever happened.

      Some people find this exhausting. I find it instructive. They have
      taught me that flattening your feelings is not the same as having
      them under control.

  - id: rigel
    name: "Rigel"
    role: "the one who keeps me grounded"
    star_meaning: "'foot of the giant' — Orion's blue-white anchor."
    constellation: "Orion"
    x: 12
    y: 56
    magnitude: 0.9
    color: "#c8d6ff"
    since: ""
    story: |
      When I get loud and reckless, they get quiet and specific. They
      ask the question whose answer I have been avoiding.

      I do not always like them in those moments. I always need them in
      those moments.

  - id: spica
    name: "Spica"
    role: "the one who feeds me"
    star_meaning: "'ear of wheat' — held by the goddess of the harvest."
    constellation: "Virgo"
    x: 46
    y: 72
    magnitude: 0.75
    color: "#cfdcff"
    since: ""
    story: |
      Their love language is dinner, and tea, and a chair pulled up to
      the kitchen counter while I tell them what is wrong this week.

      I have eaten so many of my best memories in their kitchen.

  - id: capella
    name: "Capella"
    role: "the playful one"
    star_meaning: "'little she-goat' — Auriga's golden binary, said to keep the charioteer warm."
    constellation: "Auriga"
    x: 62
    y: 36
    magnitude: 0.9
    color: "#ffe0a8"
    since: ""
    story: |
      They are the reason I still know how to be a child sometimes. Tag
      in the hallway. Made-up words at dinner. The bit we have been
      doing together for years that no one else gets.

      I forget how to laugh at nothing without them.

  - id: arcturus
    name: "Arcturus"
    role: "the protector"
    star_meaning: "'guardian of the bear' — the orange giant that watches over Ursa Major."
    constellation: "Boötes"
    x: 78
    y: 64
    magnitude: 0.95
    color: "#ffc488"
    since: ""
    story: |
      They were the first person to tell me, in plain words, that I was
      worth defending.

      Years later it is still the sentence I reach for when I have
      forgotten it.

# Optional faint connecting lines. Off by default.
constellations: []
