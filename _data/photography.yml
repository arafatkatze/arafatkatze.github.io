# Photography projects.
#
# Each entry becomes a pill in the project switcher on /photography/ and its
# images become the grid for that selection. The first entry is the default.
#
# Image URLs are built from:  image_base + image_prefix + zero-padded N + ".jpg"
# (or set `images:` explicitly as a list of full URLs to override that scheme).
#
# When the pill bar overflows the viewport, it becomes a single-row horizontal
# scroll strip with edge fades + nudge arrows -- so the list scales gracefully
# from a few projects to many.
#
# NOTE: the URLs below are TEMPORARY external placeholders used only to
# preview the layout. Replace each project with my own photos before launch.

