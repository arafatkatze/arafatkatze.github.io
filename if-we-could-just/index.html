<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>if we could just</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="if we could just">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- boiling scanned-paper background -->
  <div class="bg" id="bg"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <!-- displacement filters that make the printed ink "boil" -->
  <svg class="defs" aria-hidden="true" focusable="false">
    <filter id="boil0" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.016" numOctaves="2" seed="2" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="boil1" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013 0.015" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="boil2" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.011 0.017" numOctaves="2" seed="17" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <main class="stage">
    <p class="prompt boil">If we could just</p>

    <div class="select-wrap jitter">
      <div class="select" id="select">
        <button class="select-box" id="selectBox" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span id="selectValue">Be friends</span>
          <span class="chevron" aria-hidden="true">&#9662;</span>
        </button>
        <ul class="menu" id="menu" role="listbox" hidden>
          <li role="option" data-value="Be lovers">Be lovers</li>
          <li role="option" data-value="Be friends">Be friends</li>
          <li role="option" data-value="Stop talking">Stop talking</li>
        </ul>
      </div>

      <button class="next" id="next" type="button" aria-label="next">&rarr;</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
